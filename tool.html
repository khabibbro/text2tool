
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text2Tool App</title>
  <style>
    :root {
      --dark: #09090f;
      --purple: #7c3aed;
      --muted: #64748b;
      --bg: #f8fafc;
      --border: #e5e7eb;
      --white: #ffffff;
      --red: #dc2626;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: #111827;
    }
    #loader {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #09090f 0, #111827 240px, #f8fafc 240px);
    }
    .card {
      width: min(560px, 100%);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0,0,0,.14);
      text-align: center;
    }
    .logo {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      margin: 0 auto 14px;
      background: var(--purple);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: var(--muted); line-height: 1.5; }
    .error h1 { color: var(--red); }
    iframe {
      width: 100%;
      height: 100vh;
      border: 0;
      display: none;
      background: white;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="card" id="statusCard">
      <div class="logo">T2T</div>
      <h1>Opening your tool...</h1>
      <p>Please wait while Text2Tool loads the software.</p>
    </div>
  </div>

  <iframe id="toolFrame" title="Text2Tool Generated App"></iframe>

  <script>
    const SUPABASE_FUNCTION_BASE =
      "https://wldldtmtxmmlufcmubnr.supabase.co/functions/v1/serve-generated-tool";

    const params = new URLSearchParams(window.location.search);
    const toolId = (params.get("id") || params.get("tool") || "").trim();

    const loader = document.getElementById("loader");
    const frame = document.getElementById("toolFrame");
    const statusCard = document.getElementById("statusCard");

    function showError(message) {
      statusCard.className = "card error";
      statusCard.innerHTML = `
        <div class="logo">T2T</div>
        <h1>Tool could not open</h1>
        <p>${escapeHtml(message)}</p>
      `;
      loader.style.display = "grid";
      frame.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function (m) {
        return ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        })[m];
      });
    }

    function injectBaseTag(html, baseHref) {
      const baseTag = `<base href="${baseHref.replace(/"/g, "&quot;")}/">`;

      if (/<head[^>]*>/i.test(html)) {
        return html.replace(/<head([^>]*)>/i, `<head$1>${baseTag}`);
      }

      return `<!doctype html><html><head>${baseTag}</head><body>${html}</body></html>`;
    }

    async function loadTool() {
      if (!toolId) {
        showError("Missing tool ID.");
        return;
      }

      const safeToolId = encodeURIComponent(toolId);
      const toolUrl = `${SUPABASE_FUNCTION_BASE}/${safeToolId}`;

      try {
        const response = await fetch(toolUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`Tool file not found. Status: ${response.status}`);
        }

        let html = await response.text();

        if (!html || !html.trim()) {
          throw new Error("Tool file is empty.");
        }

        html = injectBaseTag(html, `${SUPABASE_FUNCTION_BASE}/${safeToolId}`);

        frame.srcdoc = html;
        loader.style.display = "none";
        frame.style.display = "block";
      } catch (error) {
        showError(error.message || "Something went wrong while opening this tool.");
      }
    }

    loadTool();
  </script>
</body>
</html>
