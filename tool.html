<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Text2Tool App</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root{
      --bg:#05020b;
      --bg2:#10051f;
      --card:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.16);
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --purple:#8b5cf6;
      --pink:#ec4899;
      --cyan:#22d3ee;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:
      radial-gradient(circle at 20% 0%, rgba(236,72,153,.25), transparent 34%),
      radial-gradient(circle at 80% 10%, rgba(139,92,246,.28), transparent 36%),
      linear-gradient(135deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    .loader{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .box{
      width:min(720px,100%);
      border:1px solid var(--border);
      border-radius:26px;
      padding:26px;
      background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.045));
      box-shadow:0 24px 90px rgba(139,92,246,.24);
      backdrop-filter:blur(16px);
    }
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .logo{
      width:50px;height:50px;border-radius:17px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--purple),var(--pink));
      font-weight:1000;
      box-shadow:0 18px 45px rgba(236,72,153,.25);
    }
    h1{margin:0;font-size:28px}
    p{color:var(--muted);line-height:1.55;margin:10px 0 0}
    .bar{height:10px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;margin-top:18px}
    .bar i{display:block;width:40%;height:100%;border-radius:999px;background:linear-gradient(135deg,var(--purple),var(--pink));animation:load 1.2s infinite ease-in-out}
    .err{border-color:rgba(251,113,133,.32);background:rgba(251,113,133,.08);padding:14px;border-radius:16px;color:#fff;margin-top:16px;white-space:pre-wrap}
    iframe{width:100%;height:100vh;border:0;display:block;background:#05020b}
    @keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(260%)}}
  </style>
</head>
<body>
  <div id="app">
    <div class="loader">
      <div class="box">
        <div class="brand">
          <div class="logo">T2T</div>
          <div>
            <h1>Loading Text2Tool App</h1>
            <p>Preparing your private tool...</p>
          </div>
        </div>
        <div class="bar"><i></i></div>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  var SUPABASE_PUBLIC_BASE = "https://wldldtmtxmmlufcmubnr.supabase.co/storage/v1/object/public/generated-tools";
  var ENGINE_URL = "/engine.js";

  function qs(name){
    return new URLSearchParams(location.search).get(name) || "";
  }

  function esc(value){
    return String(value == null ? "" : value).replace(/[&<>"']/g,function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c] || c;
    });
  }

  function showError(title, detail){
    document.getElementById("app").innerHTML =
      '<div class="loader"><div class="box">' +
      '<div class="brand"><div class="logo">T2T</div><div><h1>'+esc(title)+'</h1><p>Text2Tool could not open this generated app.</p></div></div>' +
      '<div class="err">'+esc(detail)+'</div>' +
      '</div></div>';
  }

  function loadScript(src){
    return new Promise(function(resolve,reject){
      var s=document.createElement("script");
      s.src=src + (src.indexOf("?")>-1 ? "&" : "?") + "v=" + Date.now();
      s.onload=resolve;
      s.onerror=function(){reject(new Error("Could not load " + src));};
      document.head.appendChild(s);
    });
  }

  async function fetchText(url){
    var r = await fetch(url, { cache:"no-store" });
    if(!r.ok) throw new Error("Fetch failed " + r.status + " for " + url);
    return await r.text();
  }

  async function fetchJson(url){
    var r = await fetch(url, { cache:"no-store" });
    if(!r.ok) throw new Error("Fetch failed " + r.status + " for " + url);
    return await r.json();
  }

  function injectBaseAndSafety(html, baseUrl){
    var baseTag = '<base href="' + baseUrl.replace(/\/?$/, "/") + '">';
    if (/<head[^>]*>/i.test(html)) {
      return html.replace(/<head[^>]*>/i, function(m){ return m + baseTag; });
    }
    return baseTag + html;
  }

  function renderLegacyHtml(html, baseUrl){
    var iframe = document.createElement("iframe");
    iframe.setAttribute("title","Text2Tool Generated App");
    iframe.setAttribute("sandbox","allow-scripts allow-forms allow-downloads allow-modals allow-popups allow-same-origin");
    iframe.srcdoc = injectBaseAndSafety(html, baseUrl);
    document.body.innerHTML = "";
    document.body.appendChild(iframe);
  }

  async function main(){
    var id = qs("id");
    if(!id){
      showError("Missing Tool ID","The URL must include ?id=YOUR_TOOL_ID");
      return;
    }

    var base = SUPABASE_PUBLIC_BASE + "/" + encodeURIComponent(id);
    var specUrl = base + "/tool_spec.json";
    var legacyHtmlUrl = base + "/index.html";

    // V7 path: small JSON blueprint + shared engine.js
    try {
      var spec = await fetchJson(specUrl);
      await loadScript(ENGINE_URL);
      if(!window.Text2ToolEngine || !window.Text2ToolEngine.render){
        throw new Error("engine.js loaded but Text2ToolEngine.render was not found.");
      }
      document.body.innerHTML = '<div id="app"></div>';
      window.Text2ToolEngine.render(spec, { root: document.getElementById("app") });
      return;
    } catch (specError) {
      console.warn("V7 spec path failed; trying legacy full HTML path.", specError);
    }

    // Legacy path: older generated full index.html files
    try {
      var html = await fetchText(legacyHtmlUrl);
      renderLegacyHtml(html, base);
      return;
    } catch (legacyError) {
      showError("Generated Tool Not Found",
        "Tool ID: " + id + "\\n\\n" +
        "Tried V7 blueprint: " + specUrl + "\\n" +
        "Tried legacy HTML: " + legacyHtmlUrl + "\\n\\n" +
        String(legacyError && (legacyError.message || legacyError))
      );
    }
  }

  main().catch(function(err){
    showError("Text2Tool Loader Error", String(err && (err.message || err)));
  });
})();
</script>
</body>
</html>
