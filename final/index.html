<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google Sheet Tool Status | Text2Tool AI</title>
  <meta name="description" content="Track your Text2Tool AI Google Sheet tool delivery status." />
  <style>
    :root {
      --bg:#05020a; --panel:#14101d; --line:rgba(255,255,255,.14);
      --text:#f8f7ff; --muted:#c9c2d8; --soft:#a59ab8; --purple:#b84dff; --pink:#f15bd6;
      --green:#22c55e; --blue:#38bdf8; --yellow:#facc15; --danger:#fb7185; --max:1120px;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:radial-gradient(circle at 80% 12%, rgba(184,77,255,.22), transparent 34%),
                 radial-gradient(circle at 18% 25%, rgba(56,189,248,.12), transparent 32%),
                 linear-gradient(180deg,#090313 0%,#05020a 50%,#030106 100%);
    }
    a { color:inherit; text-decoration:none; }
    .wrap { width:min(var(--max), calc(100% - 32px)); margin:0 auto; }
    header { position:sticky; top:0; z-index:20; background:rgba(5,2,10,.82); backdrop-filter:blur(16px); border-bottom:1px solid var(--line); }
    .nav { min-height:76px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo { width:42px; height:42px; border-radius:14px; display:grid; place-items:center; font-weight:900; background:linear-gradient(135deg,var(--purple),var(--pink)); box-shadow:0 12px 28px rgba(184,77,255,.35); }
    .brand strong { display:block; font-size:18px; line-height:1; }
    .brand span { display:block; color:var(--muted); font-size:12px; font-weight:700; margin-top:4px; }
    nav { display:flex; align-items:center; gap:24px; font-size:14px; font-weight:800; color:#efe8ff; }
    .btn {
      border:1px solid var(--line); background:rgba(255,255,255,.08); color:var(--text);
      border-radius:999px; padding:12px 18px; font-weight:900; cursor:pointer; display:inline-flex;
      align-items:center; justify-content:center; gap:8px; transition:.2s; text-decoration:none;
    }
    .btn:hover { transform:translateY(-1px); border-color:rgba(255,255,255,.28); }
    .btn-primary { border:0; background:linear-gradient(135deg,var(--purple),var(--pink)); box-shadow:0 18px 46px rgba(184,77,255,.32); }
    .btn-green { border:0; background:linear-gradient(135deg,#16a34a,#22c55e); box-shadow:0 18px 46px rgba(34,197,94,.20); }
    main { padding:38px 0 56px; }
    .hero, .card {
      border:1px solid var(--line); background:rgba(20,16,29,.82); border-radius:24px;
      box-shadow:0 20px 80px rgba(0,0,0,.22);
    }
    .hero { padding:30px; margin-bottom:20px; }
    .badge { display:inline-flex; align-items:center; gap:8px; color:#d8b4fe; background:rgba(184,77,255,.13); border:1px solid rgba(184,77,255,.28); padding:8px 12px; border-radius:999px; font-weight:900; font-size:13px; }
    .status-badge { color:#bbf7d0; background:rgba(34,197,94,.13); border-color:rgba(34,197,94,.28); }
    .waiting-badge { color:#fde68a; background:rgba(250,204,21,.13); border-color:rgba(250,204,21,.28); }
    .fixing-badge { color:#bae6fd; background:rgba(56,189,248,.13); border-color:rgba(56,189,248,.28); }
    .error-badge { color:#fecdd3; background:rgba(251,113,133,.13); border-color:rgba(251,113,133,.28); }
    h1 { font-size:clamp(32px,4vw,56px); line-height:1.02; margin:18px 0 12px; letter-spacing:-.05em; }
    h2 { font-size:22px; margin:0 0 14px; letter-spacing:-.03em; }
    p { color:var(--muted); line-height:1.58; }
    .summary { max-width:860px; font-size:17px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .card { padding:22px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    .timeline { display:grid; gap:12px; margin:0; padding:0; list-style:none; }
    .timeline li { display:flex; gap:12px; align-items:flex-start; padding:14px; border:1px solid var(--line); border-radius:16px; background:rgba(255,255,255,.06); }
    .dot { width:12px; height:12px; border-radius:999px; margin-top:5px; background:var(--soft); box-shadow:0 0 0 5px rgba(255,255,255,.06); flex:0 0 auto; }
    .active .dot { background:var(--yellow); box-shadow:0 0 0 5px rgba(250,204,21,.12); }
    .blue .dot { background:var(--blue); box-shadow:0 0 0 5px rgba(56,189,248,.12); }
    .done .dot { background:var(--green); box-shadow:0 0 0 5px rgba(34,197,94,.12); }
    .bad .dot { background:var(--danger); box-shadow:0 0 0 5px rgba(251,113,133,.12); }
    .timeline strong { display:block; margin-bottom:4px; }
    .timeline span { color:var(--muted); line-height:1.45; }
    .message { margin-top:14px; padding:14px 16px; border-radius:16px; background:rgba(255,255,255,.07); border:1px solid var(--line); color:var(--muted); }
    .error { background:rgba(251,113,133,.12); border-color:rgba(251,113,133,.35); color:#fecdd3; }
    .success { background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.35); color:#bbf7d0; }
    .info { background:rgba(56,189,248,.10); border-color:rgba(56,189,248,.28); color:#bae6fd; }
    .mini { font-size:13px; color:var(--soft); margin-top:10px; }
    .progress-wrap { height:10px; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid var(--line); overflow:hidden; margin:10px 0 12px; }
    .progress-bar { height:100%; width:0%; background:linear-gradient(135deg,var(--purple),var(--pink)); border-radius:999px; transition:.2s; }
    .customer-note { margin-top:14px; color:var(--soft); line-height:1.55; font-size:14px; }
    footer { padding:24px 0 38px; color:var(--muted); text-align:center; font-size:13px; }
    @media (max-width:800px) {
      nav { gap:12px; font-size:13px; }
      .grid { grid-template-columns:1fr; }
      .hero,.card { padding:18px; border-radius:20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a class="brand" href="/">
        <div class="logo">T2T</div>
        <div><strong>Text2Tool AI</strong><span>We build it, you own it</span></div>
      </a>
      <nav>
        <a href="/">Home</a>
        <a href="/pricing/">Pricing</a>
        <a href="/faq/">FAQ</a>
        <a class="btn btn-primary" href="/create-tool/">Create Tool</a>
      </nav>
    </div>
  </header>

  <main class="wrap" id="app">
    <section class="hero">
      <div class="badge waiting-badge">Loading status...</div>
      <h1>Please wait</h1>
      <p class="summary">Checking your Google Sheet tool delivery status.</p>
    </section>
  </main>

  <footer>
    Built for startups, agencies, virtual assistants and growing businesses. Text2Tool AI © 2026.
  </footer>

  <script>
    const SUPABASE_URL = 'https://wldldtmtxmmlufcmubnr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_R63WYwDu58UPHLJkb2eXPQ_4qUQS5PX';

    const params = new URLSearchParams(window.location.search);
    const deliveryId = params.get('id') || '';
    const deliveryToken = params.get('token') || '';
    const app = document.getElementById('app');

    const POLL_EVERY_MS = 15000;
    const MAX_AUTO_POLL_MS = 8 * 60 * 1000;
    const pollStartedAt = Date.now();
    let pollTimer = null;
    let isRefreshing = false;

    init();

    async function init() {
      if (!deliveryId || !deliveryToken) {
        showError('Google Sheet tool status link is missing or incomplete.');
        return;
      }

      await refreshStatus();

      if (!pollTimer) {
        pollTimer = setInterval(refreshStatus, POLL_EVERY_MS);
      }
    }

    async function refreshStatus() {
      if (isRefreshing) return;
      isRefreshing = true;

      try {
        const item = await fetchDeliveryStatus();
        renderStatus(item);

        if (!shouldKeepPolling(item)) {
          if (pollTimer) clearInterval(pollTimer);
          pollTimer = null;
        }
      } catch (error) {
        showError(error.message || 'Could not load Google Sheet tool status.');
      } finally {
        isRefreshing = false;
      }
    }

    function shouldKeepPolling(item) {
      const status = String(item?.status || '').toLowerCase();
      const buildStatus = String(item?.build_status || '').toLowerCase();
      const qaStatus = String(item?.qa_status || '').toLowerCase();
      const finalUrl = String(item?.final_tool_url || '').trim();

      const delivered = status === 'delivered' || !!finalUrl;
      const failed = status === 'failed' || status === 'cancelled' || status === 'qa_failed' || status === 'build_failed' || buildStatus === 'failed' || qaStatus === 'failed';

      if (delivered || failed) return false;
      return Date.now() - pollStartedAt < MAX_AUTO_POLL_MS;
    }

    async function fetchDeliveryStatus() {
      const response = await withTimeout(fetch(SUPABASE_URL + '/rest/v1/rpc/get_final_tool_delivery_status', {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: 'Bearer ' + SUPABASE_KEY,
          Accept: 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          p_delivery_id: deliveryId,
          p_delivery_token: deliveryToken
        })
      }), 20000, 'Status request timed out.');

      const text = await response.text();
      if (!response.ok) throw new Error('Google Sheet tool status could not be loaded. Please refresh.');
      const rows = JSON.parse(text);
      if (!Array.isArray(rows) || !rows.length) throw new Error('Google Sheet tool request not found.');
      return rows[0];
    }

    function renderStatus(item) {
      const status = String(item.status || 'queued').toLowerCase();
      const qaStatus = String(item.qa_status || 'not_started').toLowerCase();
      const buildStatus = String(item.build_status || 'not_started').toLowerCase();
      const scanStatus = String(item.error_scan_status || 'not_started').toLowerCase();
      const autoFixStatus = String(item.auto_fix_status || 'not_started').toLowerCase();
      const readinessScore = Math.max(0, Math.min(100, Number(item.readiness_score || 0)));
      const qaPassed = item.qa_passed === true || item.qa_passed === 'true';
      const qaAttempts = Number(item.qa_attempts || 0);
      const title = item.tool_title || 'Your Google Sheet tool';
      const summary = item.tool_summary || 'Your Google Sheet tool request has been received.';
      const finalUrl = item.final_tool_url || '';
      const creditUsed = item.credit_deducted === true || item.credit_deducted === 'true';
      const exportStarted = status === 'export_started' || buildStatus === 'export_started' || qaStatus === 'export_started' || creditUsed;
      const delivered = status === 'delivered' || !!finalUrl;
      const failed = status === 'failed' || status === 'cancelled' || status === 'qa_failed' || status === 'build_failed' || qaStatus === 'failed' || buildStatus === 'failed' || scanStatus === 'failed' || autoFixStatus === 'failed';
      const message = delivered
        ? 'Your tool is ready. Use the Make-a-copy link to own and edit your Google Sheet.'
        : exportStarted
          ? 'AI is working on your Google Sheet tool. 1 Tool Kit has been used. Your tool can take up to 5–7 minutes to finish. We’ll email you the Make-a-copy link as soon as it is ready.'
          : (item.status_message || getDefaultMessage(status, qaStatus, buildStatus, scanStatus, autoFixStatus));
      const badge = getBadge(delivered, failed, exportStarted, qaStatus, buildStatus, scanStatus, autoFixStatus);

      app.innerHTML = `
        <section class="hero">
          <div class="badge ${badge.className}">${escapeHtml(badge.text)}</div>
          <h1>${escapeHtml(title)}</h1>
          <p class="summary">${escapeHtml(summary)}</p>
          <div class="message ${delivered ? 'success' : failed ? 'error' : exportStarted || isActiveChecking(qaStatus, buildStatus, scanStatus, autoFixStatus) ? 'info' : ''}">${escapeHtml(message)}</div>
          <div class="actions">
            ${finalUrl ? `<a class="btn btn-green" href="${escapeAttr(finalUrl)}" target="_blank" rel="noopener">Make a copy and own it</a>` : ''}
            <button class="btn btn-primary" type="button" id="refreshBtn">Refresh Status</button>
            <a class="btn" href="/create-tool/">Create Another Google Sheet Tool</a>
          </div>
          <div class="customer-note">
            ${delivered
              ? 'Important: click “Make a copy” on the Google page so the tool becomes your own editable file. Some formulas may show errors or blanks until you add real data.'
              : exportStarted
                ? 'You can leave this page now. Your export has started and the Make-a-copy link will be emailed to you when the Google Sheet is ready. Please check spam/promotions if you do not see the email after 7 minutes.'
                : 'AI-built Google Sheets can take up to 7 minutes. This page refreshes automatically every 15 seconds. If formulas show errors later, add data first and the values should calculate normally.'}
          </div>
        </section>

        <div class="grid">
          <section class="card">
            <h2>Google Sheet Delivery Progress</h2>
            <ul class="timeline">
              <li class="done"><span class="dot"></span><div><strong>Preview approved</strong><span>Your Google Sheet structure was approved for final export.</span></div></li>
              <li class="${exportStarted || delivered ? 'done' : 'active'}"><span class="dot"></span><div><strong>Export started</strong><span>${exportStarted || delivered ? '1 Tool Kit has been used and your final Google Sheet build has started.' : 'Your export is being prepared.'}</span></div></li>
              <li class="${delivered ? 'done' : failed ? 'bad' : exportStarted ? 'active blue' : ''}"><span class="dot"></span><div><strong>AI building your tool</strong><span>Your AI-built Google Sheet can take up to 5–7 minutes to finish.</span></div></li>
              <li class="${delivered ? 'done' : failed ? 'bad' : exportStarted ? 'active blue' : ''}"><span class="dot"></span><div><strong>Email being prepared</strong><span>${delivered ? 'Your Make-a-copy link is ready.' : 'We’ll email you the Make-a-copy link as soon as the sheet is ready.'}</span></div></li>
              <li class="${delivered ? 'done' : failed ? 'bad' : ''}"><span class="dot"></span><div><strong>Make a copy and own it</strong><span>${delivered ? 'Open the Make-a-copy link so the tool becomes your own editable file.' : 'The email will include a link that lets you make your own copy.'}</span></div></li>
            </ul>
          </section>

          <section class="card">
            <h2>What happens next</h2>
            <p>${escapeHtml(getNextText(status, buildStatus, qaStatus, exportStarted, delivered, failed))}</p>
            <div class="progress-wrap" aria-label="Readiness score">
              <div class="progress-bar" style="width:${delivered ? 100 : exportStarted ? 65 : readinessScore}%;"></div>
            </div>
            <div class="mini">Status: ${delivered ? 'Ready' : exportStarted ? 'Export started' : readinessScore + '/100 readiness'}</div>
            <div class="message ${exportStarted && !delivered ? 'info' : ''}">Some formula cells may show errors or blanks until you add real data. Once data is entered, formulas and charts should calculate normally.</div>
            <h2 style="margin-top:22px;">Tool Kit Status</h2>
            <p>${creditUsed || exportStarted ? '1 Tool Kit has been used because you started the final export.' : 'No Tool Kit has been used yet.'}</p>
            <div class="mini">Status page ID: ${escapeHtml(String(item.id || '').slice(0, 8))}</div>
          </section>
        </div>
      `;

      const refreshBtn = document.getElementById('refreshBtn');
      if (refreshBtn) refreshBtn.addEventListener('click', refreshStatus);
    }

    function getBadge(delivered, failed, exportStarted, qaStatus, buildStatus, scanStatus, autoFixStatus) {
      if (delivered) return { text: '✅ Tool Ready', className: 'status-badge' };
      if (failed) return { text: 'Needs Attention', className: 'error-badge' };
      if (exportStarted) return { text: 'Export Started', className: 'fixing-badge' };
      if (qaStatus === 'passed') return { text: 'QA Passed', className: 'status-badge' };
      if (autoFixStatus === 'fixing' || buildStatus === 'fixing' || qaStatus === 'fixing') return { text: 'Auto Bots Fixing Issues', className: 'fixing-badge' };
      if (scanStatus === 'scanning' || buildStatus === 'scanning' || qaStatus === 'checking') return { text: 'Checking for Common Errors', className: 'fixing-badge' };
      return { text: 'Preparing Export', className: 'waiting-badge' };
    }

    function getDefaultMessage(status, qaStatus, buildStatus, scanStatus, autoFixStatus) {
      if (status === 'export_started' || buildStatus === 'export_started' || qaStatus === 'export_started') return 'AI is working on your Google Sheet tool. Your Make-a-copy link will be emailed in 5–7 minutes.';
      if (status === 'delivered') return 'Your tool is exported for online synced use to G-Sheets. Use the Make-a-copy link to own and edit it.';
      if (qaStatus === 'passed') return 'Your Google Sheet passed quality checks and is being prepared for delivery.';
      if (autoFixStatus === 'fixing' || buildStatus === 'fixing' || qaStatus === 'fixing') return 'Auto Bots are fixing issues found before delivery.';
      if (scanStatus === 'scanning' || buildStatus === 'scanning' || qaStatus === 'checking') return 'Your Google Sheet is being checked for common errors before delivery.';
      if (buildStatus === 'created_private_file') return 'Your Google Sheet has been created privately and is being checked.';
      if (buildStatus === 'building' || status === 'building') return 'Your Google Sheet is being built.';
      if (qaStatus === 'failed' || buildStatus === 'failed' || scanStatus === 'failed' || autoFixStatus === 'failed') return 'Your tool needs additional fixes before it can be delivered.';
      return 'Your Google Sheet tool request has been received. We are preparing your sheet.';
    }

    function getNextText(status, buildStatus, qaStatus, exportStarted, delivered, failed) {
      if (delivered) return 'Your Make-a-copy link is ready. Open it and click Make a copy so you own and edit the file.';
      if (failed) return 'The export needs attention. Please contact support with this status page ID.';
      if (exportStarted) return 'AI is building your Google Sheet in the background. You do not need to keep this page open. Check your email for the Make-a-copy link within 5–7 minutes.';
      if (status === 'building' || buildStatus === 'building') return 'Your Google Sheet is being prepared. This can take a few minutes.';
      if (qaStatus === 'passed') return 'The Google Sheet passed checks and is being prepared for email delivery.';
      return 'Your final export request is being prepared.';
    }

    function isActiveChecking(qaStatus, buildStatus, scanStatus, autoFixStatus) {
      return ['checking','fixing'].includes(qaStatus) || ['scanning','fixing'].includes(buildStatus) || scanStatus === 'scanning' || autoFixStatus === 'fixing';
    }

    function showError(message) {
      app.innerHTML = `
        <section class="hero">
          <div class="badge error-badge">Could not load status</div>
          <h1>Something went wrong</h1>
          <p class="summary">${escapeHtml(message)}</p>
          <div class="actions">
            <a class="btn btn-primary" href="/create-tool/">Create New Tool</a>
            <a class="btn" href="/pricing/">View Tool Kits</a>
          </div>
        </section>
      `;
    }

    function withTimeout(promise, ms, message) {
      let timer;
      const timeout = new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(message)), ms);
      });
      return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[ch]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }
  </script>

</body>
