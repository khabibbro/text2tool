<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tool Preview | Text2Tool AI</title>
  <meta name="description" content="Review your Text2Tool AI tool preview before creating your final tool." />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#05020a; --panel:#14101d; --card:#211b2d; --line:rgba(255,255,255,.14);
      --text:#f8f7ff; --muted:#c9c2d8; --soft:#a59ab8; --purple:#b84dff; --pink:#f15bd6;
      --green:#22c55e; --yellow:#facc15; --danger:#fb7185; --max:1180px;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--text);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:radial-gradient(circle at 80% 12%, rgba(184,77,255,.22), transparent 34%),
                 radial-gradient(circle at 18% 25%, rgba(56,189,248,.12), transparent 32%),
                 linear-gradient(180deg,#090313 0%,#05020a 46%,#030106 100%);
    }
    a { color:inherit; text-decoration:none; }
    .wrap { width:min(var(--max), calc(100% - 32px)); margin:0 auto; }
    header { position:sticky; top:0; z-index:20; background:rgba(5,2,10,.82); backdrop-filter:blur(16px); border-bottom:1px solid var(--line); }
    .nav { min-height:76px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo { width:42px; height:42px; border-radius:14px; display:grid; place-items:center; font-weight:900; background:linear-gradient(135deg,var(--purple),var(--pink)); box-shadow:0 12px 28px rgba(184,77,255,.35); }
    .brand strong { display:block; font-size:18px; line-height:1; }
    .brand span { display:block; color:var(--muted); font-size:12px; font-weight:700; margin-top:4px; }
    .links { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:14px; font-weight:800; color:var(--muted); }
    .links a { padding:10px 12px; border-radius:999px; }
    .links a:hover { background:rgba(255,255,255,.07); color:#fff; }
    .cta { background:linear-gradient(135deg,var(--purple),var(--pink)); color:#fff !important; padding:13px 20px !important; box-shadow:0 16px 42px rgba(184,77,255,.28); }
    main { padding:34px 0 70px; }
    .shell { background:rgba(20,16,29,.84); border:1px solid rgba(255,255,255,.18); border-radius:26px; box-shadow:0 24px 70px rgba(0,0,0,.42); overflow:hidden; }
    .loading,.error-box { padding:56px 32px; text-align:center; }
    .spinner { width:44px; height:44px; margin:0 auto 18px; border:4px solid rgba(255,255,255,.16); border-top-color:var(--purple); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hero { padding:34px; border-bottom:1px solid var(--line); background:radial-gradient(circle at 100% 0%, rgba(184,77,255,.20), transparent 26%), linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02)); }
    .topline { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:18px; }
    .badge,.pill { display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border-radius:999px; font-size:13px; font-weight:900; }
    .badge { background:rgba(34,197,94,.12); color:#bbf7d0; border:1px solid rgba(34,197,94,.24); }
    .pill { background:rgba(255,255,255,.07); color:var(--muted); border:1px solid var(--line); }
    h1 { margin:0; font-size:clamp(30px,4vw,48px); line-height:1.05; letter-spacing:-.04em; }
    .summary { margin:16px 0 0; color:var(--muted); font-size:17px; line-height:1.7; max-width:850px; }
    .warning { margin-top:18px; background:rgba(250,204,21,.12); border:1px solid rgba(250,204,21,.28); color:#fef3c7; padding:14px 16px; border-radius:16px; font-weight:800; line-height:1.5; }
    .grid { display:grid; grid-template-columns:1.4fr .8fr; gap:20px; padding:24px; }
    .card { background:rgba(255,255,255,.045); border:1px solid var(--line); border-radius:22px; padding:22px; }
    .card h2 { margin:0 0 14px; font-size:23px; letter-spacing:-.02em; }
    .card p { color:var(--muted); line-height:1.6; }
    .structure-card,.questions-card { grid-column:1/-1; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:18px; background:rgba(0,0,0,.15); }
    table { width:100%; border-collapse:collapse; min-width:760px; }
    th { background:rgba(184,77,255,.22); color:#fff; text-align:left; padding:14px 16px; font-size:13px; text-transform:uppercase; letter-spacing:.06em; }
    td { padding:16px; border-top:1px solid var(--line); vertical-align:top; color:var(--muted); line-height:1.55; }
    td:first-child { color:#fff; font-weight:900; width:190px; }
    .columns { display:flex; flex-wrap:wrap; gap:8px; }
    .col-pill { padding:8px 10px; background:rgba(255,255,255,.07); border:1px solid var(--line); border-radius:999px; color:#f2ecff; font-size:13px; font-weight:750; }
    .list { display:grid; gap:10px; margin:0; padding:0; list-style:none; }
    .list li { padding:13px 14px; border-radius:14px; background:rgba(255,255,255,.055); border:1px solid var(--line); color:#f2ecff; line-height:1.45; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border:1px solid var(--line); border-radius:999px; padding:12px 16px; font-weight:900; cursor:pointer; background:rgba(255,255,255,.07); color:#fff; font-size:14px; }
    .btn-primary { background:linear-gradient(135deg,var(--purple),var(--pink)); border-color:transparent; box-shadow:0 14px 36px rgba(184,77,255,.25); }
    textarea { width:100%; min-height:120px; resize:vertical; border-radius:16px; border:1px solid rgba(255,255,255,.18); background:rgba(5,2,10,.68); color:#fff; padding:14px; font:inherit; outline:none; }
    .question-box { border:1px solid rgba(184,77,255,.28); background:rgba(184,77,255,.07); border-radius:20px; padding:18px; margin-top:12px; }
    .change-card { border-color:rgba(184,77,255,.30); background:linear-gradient(180deg,rgba(184,77,255,.10),rgba(255,255,255,.04)); }
    .change-note { color:#a59ab8; font-size:13px; font-weight:800; line-height:1.5; margin-top:10px; }
    .change-message { margin-top:12px; padding:12px 14px; border-radius:14px; font-weight:850; line-height:1.45; display:none; }
    .change-message.success { display:block; color:#bbf7d0; border:1px solid rgba(34,197,94,.25); background:rgba(34,197,94,.10); }
    .change-message.error { display:block; color:#fecaca; border:1px solid rgba(251,113,133,.30); background:rgba(251,113,133,.10); }
    .progress-line { height:8px; background:rgba(255,255,255,.12); border-radius:99px; overflow:hidden; margin:12px 0 18px; }
    .progress-fill { height:100%; width:0%; border-radius:99px; background:linear-gradient(90deg,var(--purple),var(--pink)); }
    .q-label { color:#e9d5ff; text-transform:uppercase; letter-spacing:.08em; font-size:12px; font-weight:900; margin-bottom:8px; }
    .q-text { font-size:17px; line-height:1.55; margin:0 0 14px; }
    .empty { color:var(--soft); border:1px dashed rgba(255,255,255,.2); padding:18px; border-radius:16px; background:rgba(255,255,255,.03); }
    footer { color:var(--soft); text-align:center; padding:24px 0 0; font-size:13px; }
    @media (max-width:900px) { .grid { grid-template-columns:1fr; padding:16px; } .hero { padding:24px 18px; } }
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a class="brand" href="/">
        <div class="logo">T2T</div>
        <div><strong>Text2Tool AI</strong><span>We build it, you own it</span></div>
      </a>
      <nav class="links">
        <a href="/">Home</a>
        <a href="/pricing/">Pricing</a>
        <a href="/faq/">FAQ</a>
        <a class="cta" href="/create-tool/?v=preview-safe">Create Tool</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="shell" id="app">
        <div class="loading">
          <div class="spinner"></div>
          <h2>Loading your preview...</h2>
          <p>Please wait while we open your tool preview.</p>
          <p id="loadingNote" style="color:#a59ab8;font-size:13px;margin-top:16px;"></p>
        </div>
      </section>
      <footer>Built for startups, agencies, virtual assistants and growing businesses. Text2Tool AI © 2026.</footer>
    </div>
  </main>

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      showError('Page script error: ' + message + ' at line ' + lineno);
      return true;
    };

    window.onunhandledrejection = function(event) {
      const msg = event && event.reason && event.reason.message ? event.reason.message : 'Unknown loading error.';
      showError('Preview loading error: ' + msg);
    };

    const SUPABASE_URL = 'https://wldldtmtxmmlufcmubnr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_R63WYwDu58UPHLJkb2eXPQ_4qUQS5PX';
    const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const previewId = params.get('id') || '';
    const token = params.get('token') || '';

    let preview = null;
    let questions = [];
    let qIndex = 0;
    let answers = {};
    let storageKey = '';

    setTimeout(() => {
      const note = document.getElementById('loadingNote');
      if (note) note.textContent = 'Still loading. If this stays here, the page will show the exact error shortly.';
    }, 4000);

    init();

    async function init() {
      if (!previewId || !token) {
        showError('Preview link is missing or incomplete.');
        return;
      }

      try {
        preview = await fetchPreview();
        questions = toArray(preview.preview_questions);
        storageKey = 't2t_preview_answers_' + previewId;
        answers = readSavedAnswers();
        renderPreview();
      } catch (error) {
        showError(error.message || 'Could not load preview.');
      }
    }

    async function fetchPreview() {
      const endpoint = SUPABASE_URL + '/rest/v1/rpc/get_public_tool_preview';

      const response = await withTimeout(fetch(endpoint, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: 'Bearer ' + SUPABASE_KEY,
          Accept: 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          p_preview_id: previewId,
          p_preview_token: token
        })
      }), 15000, 'Preview request timed out.');

      const text = await response.text();

      if (!response.ok) {
        throw new Error('Preview could not be loaded. Please refresh or create a new preview.');
      }

      const rows = JSON.parse(text);
      if (!Array.isArray(rows) || !rows.length) {
        throw new Error('Preview not found or expired.');
      }

      return rows[0];
    }

    function renderPreview() {
      const title = preview.preview_title || 'Your tool preview is ready.';
      const summary = preview.preview_summary || 'Review your tool preview before creating the final tool.';
      const warning = preview.preview_warning || '';
      const complexity = preview.complexity || 'simple';

      app.innerHTML = `
        <div class="hero">
          <div class="topline">
            <div class="badge">✅ Preview Ready</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <div class="pill">Complexity: ${escapeHtml(capitalize(complexity))}</div>
              <div class="pill">Preview saved for 30 days</div>
              <div class="pill">1 Tool Credit = 1 tool</div>
            </div>
          </div>
          <h1>${escapeHtml(title)}</h1>
          <p class="summary">${escapeHtml(summary)}</p>
          ${warning ? `<div class="warning">${escapeHtml(warning)}</div>` : ''}
        </div>

        <div class="grid">
          <section class="card">
            <h2>Preview Status</h2>
            <p>This is your tool preview. Review the structure and answer the questions before creating your final tool.</p>
            <div class="actions">
              <a class="btn btn-primary" href="/pricing/">View Tool Credits</a>
              <a class="btn" href="/create-tool/?v=preview-safe">Create Another Preview</a>
            </div>
          </section>

          <section class="card final-create-card">
            <h2>Create Final Tool</h2>
            <p>When the preview looks good, request your finished working tool. No code is shown to customers.</p>
            <div class="actions">
              <button class="btn btn-primary" type="button" id="createFinalToolBtn">Create My Tool</button>
              <a class="btn" href="/pricing/">View Tool Credits</a>
            </div>
            <div class="change-message" id="finalToolMessage"></div>
            <p class="change-note">No Tool Credit is used yet. 1 Tool Credit is used only after the finished working tool is successfully delivered.</p>
          </section>

          <section class="card change-card structure-card">
            <h2>Request Changes</h2>
            <p>Need edits? Tell Text2Tool what to add, remove, or change. This will create a fresh updated preview plan, not a chat reply.</p>
            <textarea id="changeRequestBox" placeholder="Example: Add a Suppliers tab, include payment status, make the dashboard simpler, and add Auto Bots formula repair notes."></textarea>
            <div class="actions">
              <button class="btn btn-primary" type="button" id="requestChangesBtn">Update Preview</button>
            </div>
            <div class="change-message" id="changeMessage"></div>
            <p class="change-note">This uses one preview from your available preview allowance only when the updated preview is successfully created.</p>
          </section>

          <section class="card structure-card">
            <h2>Suggested Tool Structure</h2>
            ${renderStructure(preview.preview_structure)}
          </section>

          <section class="card">
            <h2>Recommended Sections</h2>
            ${renderList(preview.preview_sections, 'No recommended sections were returned.')}
          </section>

          <section class="card">
            <h2>Built-in Formulas, Smart Features and Auto Bots</h2>
            ${renderList(preview.preview_fields, 'No important fields were returned.')}
          </section>

          <section class="card questions-card">
            <h2>Follow-up Questions</h2>
            <p>Answer one question at a time. Your answers are saved in this browser.</p>
            <div id="questionsArea"></div>
          </section>
        </div>
      `;

      renderQuestions();
      setupChangeRequest();
      setupCreateFinalTool();
    }


    function setupCreateFinalTool() {
      const btn = document.getElementById('createFinalToolBtn');
      const msg = document.getElementById('finalToolMessage');
      if (!btn || !msg) return;

      btn.addEventListener('click', async () => {
        saveCurrentAnswer();

        msg.className = 'change-message';
        msg.textContent = '';

        if (!supabaseClient) {
          msg.className = 'change-message error';
          msg.textContent = 'Could not load the delivery system. Please refresh the page and try again.';
          return;
        }

        const confirmed = window.confirm('Request your finished working tool now? No source code will be shown. No Tool Credit is used until the finished tool is delivered.');
        if (!confirmed) return;

        btn.disabled = true;
        btn.textContent = 'Saving request...';
        msg.className = 'change-message success';
        msg.textContent = 'Saving your final tool request. Please wait...';

        try {
          const sessionResult = await supabaseClient.auth.getSession().catch(() => ({ data: null }));
          const session = sessionResult?.data?.session;
          if (!session?.access_token) {
            throw new Error('Please sign in first to create your final tool.');
          }

          const rpcResult = await withTimeout(
            supabaseClient.rpc('create_final_tool_delivery_request', {
              p_preview_id: previewId,
              p_preview_token: token,
              p_followup_answers: buildFollowupAnswersObject()
            }),
            45000,
            'Final tool request timed out. Please try again.'
          );

          if (rpcResult.error) {
            throw new Error(rpcResult.error.message || 'Could not save final tool request.');
          }

          const data = rpcResult.data || {};
          if (!data.success) {
            throw new Error(data.message || 'Could not save final tool request.');
          }

          msg.className = 'change-message success';
          msg.textContent = data.already_exists
            ? 'Your final tool request is already in progress. Opening status page...'
            : 'Final tool request saved. Starting private build...';

          if (!data.already_exists) {
            try {
              await callProcessToolRequest({
                action: 'build_final_tool',
                delivery_id: data.delivery_id,
                delivery_token: data.delivery_token
              }, 120000, 'Private build is taking longer than expected. Opening status page now.');
            } catch (buildError) {
              console.warn('Private build trigger failed:', buildError);
              msg.textContent = 'Final tool request saved. Opening status page...';
            }
          }

          window.location.href = '/final/?id=' + encodeURIComponent(data.delivery_id) + '&token=' + encodeURIComponent(data.delivery_token) + '&v=delivery2';
        } catch (error) {
          msg.className = 'change-message error';
          msg.textContent = error?.message || 'Could not save final tool request. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Create My Tool';
        }
      });
    }

    function buildFollowupAnswersObject() {
      const result = {};
      questions.forEach((question, index) => {
        result[String(index + 1)] = {
          question: String(question || ''),
          answer: String(answers[index] || '').trim()
        };
      });
      return result;
    }

    function setupChangeRequest() {
      const box = document.getElementById('changeRequestBox');
      const btn = document.getElementById('requestChangesBtn');
      const msg = document.getElementById('changeMessage');
      if (!box || !btn || !msg) return;

      btn.addEventListener('click', async () => {
        const changeText = String(box.value || '').trim();

        msg.className = 'change-message';
        msg.textContent = '';

        if (!changeText) {
          msg.className = 'change-message error';
          msg.textContent = 'Please type the changes you want first.';
          return;
        }

        if (changeText.length > 4000) {
          msg.className = 'change-message error';
          msg.textContent = 'Please keep your change request under 4,000 characters.';
          return;
        }

        if (/(https?:\/\/|www\.|(^|[^A-Za-z0-9@._-])([A-Za-z0-9-]+\.)+[A-Za-z]{2,}([\/?#:]|$|[^A-Za-z0-9._-]))/i.test(changeText)) {
          msg.className = 'change-message error';
          msg.textContent = 'Links are not allowed here. Please remove website links/domains.';
          return;
        }

        if (!supabaseClient) {
          msg.className = 'change-message error';
          msg.textContent = 'Could not load the update system. Please refresh the page and try again.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Updating preview...';
        msg.className = 'change-message success';
        msg.textContent = 'Creating your updated preview. Please wait...';

        try {
          const data = await callProcessToolRequest({
            action: 'request_changes',
            preview_id: previewId,
            preview_token: token,
            change_request: changeText
          });

          if (!data || !data.success) throw new Error(data?.error || 'Could not update preview.');

          msg.className = 'change-message success';
          msg.textContent = 'Updated preview ready. Opening it now...';
          window.location.href = '/preview/?id=' + encodeURIComponent(data.preview_id) + '&token=' + encodeURIComponent(data.preview_token) + '&v=changes1';
        } catch (error) {
          msg.className = 'change-message error';
          msg.textContent = error?.message || 'Could not update preview. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Update Preview';
        }
      });
    }


    async function callProcessToolRequest(payload, timeoutMs = 45000, timeoutMessage = 'Preview update timed out. Please try again.') {
      const sessionResult = await supabaseClient.auth.getSession().catch(() => ({ data: null }));
      const accessToken = sessionResult?.data?.session?.access_token || SUPABASE_KEY;

      const response = await withTimeout(fetch(SUPABASE_URL + '/functions/v1/process-tool-request', {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      }), timeoutMs, timeoutMessage);

      const text = await response.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) { data = null; }

      if (!response.ok) {
        throw new Error(data?.error || 'Could not update preview. Please try again.');
      }

      return data;
    }

    function renderStructure(value) {
      const rows = normalizeStructure(value);

      if (!rows.length) {
        const sections = toArray(preview.preview_sections);
        const fields = toArray(preview.preview_fields);

        if (!sections.length && !fields.length) {
          return '<div class="empty">Create another preview to see the suggested tabs and columns.</div>';
        }

        const fallbackRows = sections.slice(0, 6).map((section, index) => ({
          tab_name: section,
          purpose: 'Suggested section for this tool.',
          columns: fields.slice(index * 5, index * 5 + 5)
        }));

        return renderStructureTable(fallbackRows);
      }

      return renderStructureTable(rows);
    }

    function renderStructureTable(rows) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tab Name</th>
                <th>Purpose</th>
                <th>Columns / Sections</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${escapeHtml(row.tab_name)}</td>
                  <td>${escapeHtml(row.purpose || 'Used for this part of the tool.')}</td>
                  <td><div class="columns">${toArray(row.columns).length ? toArray(row.columns).map(col => `<span class="col-pill">${escapeHtml(col)}</span>`).join('') : '<span class="col-pill">To be confirmed</span>'}</div></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderList(value, emptyText) {
      const items = toArray(value);
      if (!items.length) return `<div class="empty">${escapeHtml(emptyText)}</div>`;
      return `<ul class="list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function renderQuestions() {
      const area = document.getElementById('questionsArea');
      if (!area) return;

      if (!questions.length) {
        area.innerHTML = '<div class="empty">No follow-up questions were needed for this preview.</div>';
        return;
      }

      const q = questions[qIndex] || questions[0];
      const answeredCount = Object.values(answers).filter(v => String(v || '').trim()).length;
      const progress = Math.round(((qIndex + 1) / questions.length) * 100);
      const savedAnswer = answers[qIndex] || '';

      area.innerHTML = `
        <div class="question-box">
          <div class="pill">Question ${qIndex + 1} of ${questions.length}</div>
          <div class="progress-line"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="q-label">Text2Tool Question</div>
          <p class="q-text">${escapeHtml(q)}</p>
          <textarea id="answerBox" placeholder="Type your answer here...">${escapeHtml(savedAnswer)}</textarea>
          <div class="actions">
            <button class="btn" type="button" id="prevQuestion">Previous</button>
            <button class="btn" type="button" id="skipQuestion">Skip for now</button>
            <button class="btn btn-primary" type="button" id="nextQuestion">${qIndex === questions.length - 1 ? 'Save Answer' : 'Next Question'}</button>
            <button class="btn" type="button" id="copyAnswers">Copy answers</button>
          </div>
          <p style="color:#a59ab8;font-size:13px;font-weight:800;">${answeredCount} of ${questions.length} answered. Answers are saved in this browser.</p>
        </div>
      `;

      document.getElementById('answerBox').addEventListener('input', saveCurrentAnswer);
      document.getElementById('prevQuestion').addEventListener('click', () => { saveCurrentAnswer(); qIndex = Math.max(0, qIndex - 1); renderQuestions(); });
      document.getElementById('skipQuestion').addEventListener('click', () => { qIndex = Math.min(questions.length - 1, qIndex + 1); renderQuestions(); });
      document.getElementById('nextQuestion').addEventListener('click', () => { saveCurrentAnswer(); if (qIndex < questions.length - 1) qIndex++; renderQuestions(); });
      document.getElementById('copyAnswers').addEventListener('click', copyAnswers);
    }

    function saveCurrentAnswer() {
      const answerBox = document.getElementById('answerBox');
      if (!answerBox) return;
      answers[qIndex] = answerBox.value;
      localStorage.setItem(storageKey, JSON.stringify(answers));
    }

    function readSavedAnswers() {
      try { return JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch (_) { return {}; }
    }

    function formatAnswers() {
      return questions.map((question, index) => {
        const answer = String(answers[index] || '').trim();
        return `Q${index + 1}: ${question}\nA${index + 1}: ${answer || '[Not answered yet]'}`;
      }).join('\n\n');
    }

    async function copyAnswers() {
      saveCurrentAnswer();
      try {
        await navigator.clipboard.writeText(formatAnswers());
        alert('Answers copied.');
      } catch (_) {
        alert(formatAnswers());
      }
    }

    function showError(message) {
      const box = document.getElementById('app');
      if (!box) return;
      box.innerHTML = `
        <div class="error-box">
          <h2>Preview could not be opened</h2>
          <p style="color:#c9c2d8;line-height:1.6;max-width:800px;margin:0 auto 18px;">${escapeHtml(message)}</p>
          <div class="actions" style="justify-content:center;">
            <a class="btn btn-primary" href="/create-tool/?v=preview-error">Create Tool</a>
            <a class="btn" href="/">Go Home</a>
          </div>
        </div>
      `;
    }

    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(message || 'Request timed out.')), ms))
      ]);
    }

    function normalizeStructure(value) {
      let rows = value;
      if (typeof rows === 'string') {
        try { rows = JSON.parse(rows); } catch (_) { rows = []; }
      }
      if (!Array.isArray(rows)) return [];
      return rows.map(item => {
        if (!item || typeof item !== 'object') return null;
        return {
          tab_name: String(item.tab_name || item.name || '').trim(),
          purpose: String(item.purpose || '').trim(),
          columns: toArray(item.columns)
        };
      }).filter(item => item && item.tab_name);
    }

    function toArray(value) {
      if (Array.isArray(value)) return value.map(item => String(item || '').trim()).filter(Boolean);
      if (typeof value === 'string') {
        try {
          const parsed = JSON.parse(value);
          if (Array.isArray(parsed)) return parsed.map(item => String(item || '').trim()).filter(Boolean);
        } catch (_) {}
        return value.split('\n').map(item => item.trim()).filter(Boolean);
      }
      return [];
    }

    function capitalize(value) {
      const clean = String(value || '').trim();
      return clean ? clean.charAt(0).toUpperCase() + clean.slice(1) : '';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }
  </script>
</body>
</html>
