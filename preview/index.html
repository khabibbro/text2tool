<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tool Preview | Text2Tool AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,Helvetica,sans-serif;
  min-height:100vh;
  background:#07070d;
  color:#fff;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(168,85,247,.22),transparent 28%),
    radial-gradient(circle at 80% 10%,rgba(126,34,206,.18),transparent 25%),
    radial-gradient(circle at 50% 80%,rgba(168,85,247,.12),transparent 35%);
  z-index:-1;
}
.container{
  width:92%;
  max-width:1000px;
  margin:auto;
  padding:38px 0 70px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  margin-bottom:46px;
}
.logo{
  font-size:26px;
  font-weight:900;
  letter-spacing:.5px;
}
.logo span{color:#c084fc}
.userbox{
  color:#d8c8ff;
  font-size:14px;
  text-align:right;
}
.logout{
  margin-top:8px;
  background:transparent;
  color:#c084fc;
  border:1px solid #7c3aed;
  padding:8px 13px;
  border-radius:10px;
  cursor:pointer;
}
.card{
  background:rgba(18,18,25,.94);
  border:1px solid #6d28d9;
  border-radius:28px;
  padding:42px;
  box-shadow:0 0 45px rgba(168,85,247,.18);
}
.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(168,85,247,.14);
  border:1px solid rgba(168,85,247,.35);
  color:#d8b4fe;
  font-weight:700;
  margin-bottom:18px;
}
h1{
  font-size:44px;
  line-height:1.12;
  margin-bottom:14px;
}
.summary{
  color:#eadfff;
  font-size:18px;
  line-height:1.6;
  margin-bottom:28px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:20px;
}
.box{
  background:rgba(168,85,247,.08);
  border:1px solid rgba(168,85,247,.24);
  border-radius:18px;
  padding:22px;
}
.box h2{
  font-size:20px;
  color:#d8b4fe;
  margin-bottom:14px;
}
ul{
  padding-left:20px;
  color:#f2eaff;
  line-height:1.8;
}
.empty{
  color:#bda9e9;
  line-height:1.6;
}
.price-card{
  margin-top:22px;
  background:rgba(34,197,94,.10);
  border:1px solid rgba(34,197,94,.30);
  border-radius:18px;
  padding:24px;
}
.price-card h2{
  font-size:22px;
  margin-bottom:8px;
}
.price{
  font-size:36px;
  font-weight:900;
  margin:10px 0;
}
.small{
  color:#d8ffe5;
  line-height:1.55;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin-top:18px;
}
.btn{
  display:inline-block;
  background:linear-gradient(135deg,#9333ea,#c084fc);
  color:#fff;
  padding:15px 28px;
  border-radius:14px;
  border:0;
  cursor:pointer;
  font-weight:800;
  font-size:16px;
  text-decoration:none;
  box-shadow:0 0 30px rgba(168,85,247,.45);
}
.btn.secondary{
  background:transparent;
  border:1px solid #7c3aed;
  color:#d8c8ff;
  box-shadow:none;
}
.notice{
  padding:18px;
  border-radius:16px;
  background:rgba(239,68,68,.12);
  border:1px solid rgba(239,68,68,.35);
  color:#ffe0e0;
  line-height:1.5;
}
.loading{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#d8c8ff;
  font-size:18px;
}
@media(max-width:760px){
  .topbar{align-items:flex-start;flex-direction:column}
  .userbox{text-align:left}
  h1{font-size:34px}
  .card{padding:28px 20px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div id="loading" class="loading">Loading your preview...</div>

<div id="app" class="container" style="display:none">
  <div class="topbar">
    <div class="logo">TEXT<span>2</span>TOOL AI</div>
    <div class="userbox">
      <div id="userEmail">Signed in</div>
      <button class="logout" type="button" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://wldldtmtxmmlufcmubnr.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_R63WYwDu58UPHLJkb2eXPQ_4qUQS5PX";
const LOGIN_REDIRECT_URL = window.location.href;

const text2toolSupabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_PUBLISHABLE_KEY
);

let currentUser = null;

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function listHtml(items, emptyText) {
  if (!Array.isArray(items) || items.length === 0) {
    return `<p class="empty">${escapeHtml(emptyText)}</p>`;
  }

  return "<ul>" + items.map(item => `<li>${escapeHtml(item)}</li>`).join("") + "</ul>";
}

function showError(message) {
  document.getElementById("content").innerHTML =
    `<div class="notice">${escapeHtml(message)}</div>
     <div class="actions">
       <a class="btn secondary" href="https://text2tool.com/create-tool/">Create New Tool</a>
     </div>`;
}

function renderPreview(preview) {
  const title = preview.preview_title || "Custom Business Tool";
  const summary = preview.preview_summary || "Your tool preview is ready.";
  const complexity = preview.complexity || "simple";

  document.getElementById("content").innerHTML = `
    <div class="card">
      <div class="badge">Preview Ready • $1 launch offer</div>
      <h1>Your ${escapeHtml(title)} preview is ready.</h1>
      <p class="summary">${escapeHtml(summary)}</p>

      <div class="grid">
        <div class="box">
          <h2>What your tool will include</h2>
          ${listHtml(preview.preview_sections, "Sections will be prepared based on your request.")}
        </div>

        <div class="box">
          <h2>Main fields we plan to include</h2>
          ${listHtml(preview.preview_fields, "Fields will be selected during tool generation.")}
        </div>
      </div>

      <div class="grid">
        <div class="box">
          <h2>Complexity</h2>
          <p class="empty">${escapeHtml(complexity.charAt(0).toUpperCase() + complexity.slice(1))}</p>
        </div>

        <div class="box">
          <h2>Questions</h2>
          ${listHtml(preview.preview_questions, "No extra questions needed. We can prepare the first version.")}
        </div>
      </div>

      <div class="price-card">
        <h2>Launch offer</h2>
        <div class="price">$1</div>
        <p class="small">
          Next step: payment connection. After payment, this preview will move into tool generation and delivery.
        </p>
      </div>

      <div class="actions">
        <button class="btn" type="button" onclick="alert('Payment connection is the next step.');">Continue to Payment</button>
        <a class="btn secondary" href="https://text2tool.com/create-tool/">Create Another Tool</a>
      </div>
    </div>
  `;
}

async function loadPreview() {
  const params = new URLSearchParams(window.location.search);
  const previewId = params.get("id");
  const previewToken = params.get("token");

  const { data, error } = await text2toolSupabase.auth.getSession();

  if (error) {
    console.error(error);
  }

  if (!data.session) {
    await text2toolSupabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: LOGIN_REDIRECT_URL
      }
    });
    return;
  }

  currentUser = data.session.user;

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("userEmail").textContent = currentUser.email || "Signed in";

  if (!previewId || !previewToken) {
    showError("Preview link is missing. Please create a new tool request.");
    return;
  }

  const { data: preview, error: previewError } = await text2toolSupabase
    .from("generated_tool_previews")
    .select("id, preview_title, preview_summary, preview_sections, preview_fields, preview_questions, complexity, status, preview_token")
    .eq("id", previewId)
    .eq("preview_token", previewToken)
    .single();

  if (previewError || !preview) {
    console.error(previewError);
    showError("Preview could not be found. Please create a new tool request.");
    return;
  }

  renderPreview(preview);
}

document.getElementById("logoutBtn").addEventListener("click", async function() {
  await text2toolSupabase.auth.signOut();
  window.location.href = "https://text2tool.com";
});

loadPreview();
</script>
</body>
</html>
