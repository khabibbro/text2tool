  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f6f9ff;
      --bg-soft: #eef5ff;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --text: #111827;
      --muted: #5f6b7c;
      --soft: #7b8797;
      --line: #dfe7f3;
      --line-strong: #cbd8ea;
      --blue: #2563eb;
      --blue-2: #1d4ed8;
      --blue-soft: #eef5ff;
      --green: #16a34a;
      --green-soft: #ecfdf5;
      --yellow: #f59e0b;
      --yellow-soft: #fff7ed;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --max: 1180px;
      --shadow: 0 24px 70px rgba(27, 55, 96, 0.10);
      --shadow-soft: 0 14px 34px rgba(30, 64, 175, 0.08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 8%, rgba(37, 99, 235, 0.08), transparent 30%),
        radial-gradient(circle at 88% 2%, rgba(29, 78, 216, 0.07), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #f5f8ff 48%, #ffffff 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }

    button,
    textarea {
      font: inherit;
    }

    .wrap {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      min-height: 76px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: max-content;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #081225;
      background: linear-gradient(135deg, #31b7ff 0%, #2563eb 100%);
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.24);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand strong {
      display: block;
      color: var(--text);
      font-size: 19px;
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .links {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 28px;
      color: #344054;
      font-size: 14px;
      font-weight: 650;
    }

    .links a {
      position: relative;
      padding: 9px 0;
      border-radius: 0;
      transition: color .18s ease;
    }

    .links a:hover {
      color: var(--blue);
      background: transparent;
    }

    .links .cta {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px !important;
      border-radius: 12px;
      color: #ffffff !important;
      background: var(--blue);
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.22);
      font-size: 14px;
      font-weight: 800;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .links .cta:hover {
      transform: translateY(-1px);
      background: var(--blue-2);
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.28);
    }

    main {
      padding: 36px 0 80px;
    }

    .shell {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .loading,
    .error-box {
      padding: 56px 32px;
      text-align: center;
    }

    .loading h2,
    .error-box h2 {
      margin: 0;
      color: var(--text);
      font-size: clamp(30px, 3.4vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .loading p,
    .error-box p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
      font-weight: 550;
    }

    .spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 18px;
      border: 4px solid #dbe7fb;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hero {
      padding: 36px;
      border-bottom: 1px solid var(--line);
      background:
        radial-gradient(circle at 92% 0%, rgba(37, 99, 235, 0.10), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .badge,
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #cfe0ff;
      background: #f3f8ff;
      color: #164a9e;
      font-size: 13px;
      line-height: 1;
      font-weight: 850;
    }

    .badge {
      color: #166534;
      background: #ecfdf5;
      border-color: #bbf7d0;
    }

    .hero h1 {
      max-width: 860px;
      margin: 0;
      color: var(--text);
      font-size: clamp(42px, 5vw, 66px);
      line-height: 1.02;
      letter-spacing: -0.065em;
      font-weight: 800;
    }

    .summary {
      max-width: 850px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.65;
      font-weight: 520;
    }

    .warning {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      color: #9a3412;
      background: var(--yellow-soft);
      border: 1px solid #fed7aa;
      font-weight: 750;
      line-height: 1.55;
    }

    .compact-note {
      margin: 0;
      color: var(--soft);
      font-size: 13px;
      font-weight: 760;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      padding: 24px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
      padding: 24px;
      min-width: 0;
    }

    .card h2 {
      margin: 0 0 14px;
      color: var(--text);
      font-size: 26px;
      line-height: 1.12;
      letter-spacing: -0.045em;
      font-weight: 800;
    }

    .card p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
      font-weight: 560;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th {
      text-align: left;
      padding: 16px;
      color: #ffffff;
      background: var(--blue);
      font-size: 13px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 900;
    }

    td {
      padding: 16px;
      color: #263244;
      border-top: 1px solid var(--line);
      vertical-align: top;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 560;
    }

    .columns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .col-pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 999px;
      color: #164a9e;
      background: var(--blue-soft);
      border: 1px solid #cfe0ff;
      font-size: 12px;
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
    }

    .list li {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      color: #263244;
      font-size: 15px;
      line-height: 1.55;
      font-weight: 620;
    }

    .list li::before {
      content: "✓";
      color: var(--blue);
      font-weight: 900;
    }

    .empty {
      color: var(--soft);
      border: 1px dashed var(--line-strong);
      padding: 18px;
      border-radius: 16px;
      background: #f8fbff;
    }

    .change-card {
      border-color: #cfe0ff;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .change-warning {
      margin-top: 12px;
      padding: 14px;
      border-radius: 16px;
      color: #9a3412;
      background: var(--yellow-soft);
      border: 1px solid #fed7aa;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 750;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      margin-top: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #f8fbff;
      color: var(--text);
      padding: 14px;
      font: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
      background: #ffffff;
    }

    .change-note {
      color: var(--soft);
      font-size: 13px;
      font-weight: 760;
      line-height: 1.55;
      margin-top: 10px;
    }

    .change-message,
    .save-message {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 760;
      line-height: 1.45;
      display: none;
    }

    .change-message.success,
    .save-message.success {
      display: block;
      color: #166534;
      border: 1px solid #bbf7d0;
      background: #ecfdf5;
    }

    .change-message.error,
    .save-message.error {
      display: block;
      color: #991b1b;
      border: 1px solid #fecaca;
      background: #fef2f2;
    }

    .bottom-actions-card {
      background: #f8fbff;
      border-color: #cfe0ff;
    }

    .bottom-actions-card .actions {
      justify-content: flex-end;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      padding: 0 18px;
      color: var(--text);
      background: #ffffff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #bcd0f4;
      box-shadow: 0 14px 28px rgba(27, 55, 96, 0.10);
    }

    .btn-primary {
      color: #ffffff;
      background: var(--blue);
      border-color: var(--blue);
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.22);
    }

    .btn-primary:hover {
      background: var(--blue-2);
      border-color: var(--blue-2);
      box-shadow: 0 20px 42px rgba(37, 99, 235, 0.28);
    }

    .btn-green {
      color: #166534;
      background: #ecfdf5;
      border-color: #bbf7d0;
    }

    .btn:disabled {
      opacity: .62;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      margin-left: 7px;
      border-radius: 999px;
      border: 1px solid #cfe0ff;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      cursor: help;
      vertical-align: middle;
      background: #f3f8ff;
    }

    .question-box {
      border: 1px solid #cfe0ff;
      background: #f8fbff;
      border-radius: 20px;
      padding: 18px;
      margin-top: 12px;
    }

    .progress-line {
      height: 8px;
      background: #e5edf9;
      border-radius: 99px;
      overflow: hidden;
      margin: 12px 0 18px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: var(--blue);
    }

    .q-label {
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .q-text {
      color: var(--text);
      font-size: 17px;
      line-height: 1.55;
      margin: 0 0 14px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .step {
      border: 1px solid var(--line);
      background: #f8fbff;
      border-radius: 16px;
      padding: 14px;
    }

    .step strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-weight: 850;
    }

    .step span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .export-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, .52);
      backdrop-filter: blur(10px);
      padding: 22px;
    }

    .export-modal-overlay.show {
      display: flex;
    }

    .export-modal-box {
      width: min(620px, 100%);
      border-radius: 24px;
      border: 1px solid var(--line);
      background: #ffffff;
      box-shadow: 0 28px 90px rgba(15, 23, 42, .22);
      padding: 26px;
      text-align: left;
    }

    .export-modal-text {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      line-height: 1.65;
      font-weight: 800;
      letter-spacing: -.01em;
    }

    .export-modal-note {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: #f3f8ff;
      border: 1px solid #cfe0ff;
      color: #164a9e;
      font-size: 16px;
      line-height: 1.65;
      font-weight: 800;
    }

    .export-modal-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .export-modal-actions .btn {
      min-width: 120px;
    }

    footer {
      color: var(--soft);
      text-align: center;
      padding: 24px 0 0;
      font-size: 13px;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .wrap {
        width: min(100% - 28px, var(--max));
      }

      .nav {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px 0;
      }

      .links {
        justify-content: flex-start;
        flex-wrap: wrap;
        gap: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .hero {
        padding: 24px 18px;
      }

      .hero h1 {
        font-size: 38px;
      }

      .steps {
        grid-template-columns: 1fr;
      }

      .bottom-actions-card .actions {
        justify-content: stretch;
      }

      .btn {
        flex: 1;
        min-width: 140px;
      }
    }

    /* V3: use uploaded T2T logo */
    .brand-logo-img {
      width: 74px !important;
      height: auto !important;
      aspect-ratio: auto !important;
      border-radius: 0 !important;
      display: block !important;
      place-items: initial !important;
      background: transparent !important;
      color: transparent !important;
      box-shadow: none !important;
      object-fit: contain !important;
      flex: 0 0 auto !important;
    }

    .brand {
      gap: 14px !important;
    }

    .export-modal-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .export-modal-logo {
      width: 76px;
      height: auto;
      display: block;
    }

    .export-modal-brand strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .export-modal-brand span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.04em;
    }


    /* V4: embedded logo and favicon, no external image dependency */
    .brand-logo-img {
      width: 92px !important;
      height: auto !important;
      aspect-ratio: auto !important;
      border-radius: 0 !important;
      display: block !important;
      place-items: initial !important;
      background: transparent !important;
      color: transparent !important;
      box-shadow: none !important;
      object-fit: contain !important;
      flex: 0 0 auto !important;
    }

    .export-modal-logo {
      width: 94px !important;
      height: auto !important;
      display: block !important;
      object-fit: contain !important;
    }

    .brand {
      gap: 12px !important;
      align-items: center !important;
    }

  </style>

</head>

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      showError('Page script error: ' + message + ' at line ' + lineno);
      return true;
    };

    window.onunhandledrejection = function(event) {
      const msg = event && event.reason && event.reason.message ? event.reason.message : 'Unknown loading error.';
      showError('Preview loading error: ' + msg);
    };

    const SUPABASE_URL = 'https://wldldtmtxmmlufcmubnr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_R63WYwDu58UPHLJkb2eXPQ_4qUQS5PX';
    const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const previewId = params.get('id') || '';
    const token = params.get('token') || '';
    let exportPreviewId = previewId;
    let exportPreviewToken = token;
    let savedChangeRequest = '';

    let preview = null;
    let questions = [];
    let qIndex = 0;
    let answers = {};
    let storageKey = '';
    let saveTimer = null;

    setTimeout(() => {
      const note = document.getElementById('loadingNote');
      if (note) note.textContent = 'Still loading. If this stays here, the page will show the exact error shortly.';
    }, 4000);

    init();

    async function init() {
      if (!previewId || !token) {
        showError('Preview link is missing or incomplete.');
        return;
      }

      try {
        preview = await fetchPreview();
        questions = [];
        storageKey = 't2t_preview_answers_' + previewId;
        answers = readSavedAnswers();
        renderPreview();
      } catch (error) {
        showError(error.message || 'Could not load preview.');
      }
    }

    async function fetchPreview() {
      const endpoint = SUPABASE_URL + '/rest/v1/rpc/get_public_tool_preview';

      const response = await withTimeout(fetch(endpoint, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: 'Bearer ' + SUPABASE_KEY,
          Accept: 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          p_preview_id: previewId,
          p_preview_token: token
        })
      }), 15000, 'Preview request timed out.');

      const text = await response.text();

      if (!response.ok) {
        throw new Error('Preview could not be loaded. Please refresh or create a new preview.');
      }

      const rows = JSON.parse(text);
      if (!Array.isArray(rows) || !rows.length) {
        throw new Error('Preview not found or expired.');
      }

      return rows[0];
    }

    function renderPreview() {
      const title = preview.preview_title || 'Your tool preview is ready.';
      const summary = preview.preview_summary || 'Review your tool preview before creating the final tool.';
      const warning = preview.preview_warning || '';
      const complexity = preview.complexity || 'simple';

      app.innerHTML = `
        <div class="hero">
          <div class="topline">
            <div class="badge">✅ Preview Ready</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <div class="pill">Complexity: ${escapeHtml(capitalize(complexity))}</div>
              <div class="pill">1 Tool Kit = 1 delivery</div>
            </div>
          </div>
          <h1>${escapeHtml(title)}</h1>
          <p class="summary">${escapeHtml(summary)}</p>
          ${warning ? `<div class="warning">${escapeHtml(warning)}</div>` : ''}
          <p class="compact-note" style="margin-top:14px;">No Tool Kit is used on this preview page. 1 Tool Kit is used when you click Done — Export.</p>
        </div>

        <div class="grid">
          <section class="card full">
            <h2>Preview <span class="info-icon" title="This is a simple preview of what your finished Google Sheet will include.">i</span></h2>
            <p class="compact-note">This is a high-level preview. The final Google Sheet may include extra formulas, dropdowns, dashboards, settings, and repair buttons created during export.</p>
            ${renderStructure(preview.preview_structure)}
          </section>

          <section class="card full">
            <h2>Tool Features <span class="info-icon" title="These are the helpful parts Text2Tool plans to include automatically in the finished tool.">i</span></h2>
            ${renderList(preview.preview_fields, 'Standard Google Sheet features will be added during export.')}
          </section>

          <section class="card change-card full" id="changeCard">
            <h2>Request Changes <span class="info-icon" title="Use this only when the final tool really needs changes.">i</span></h2>
            <p>Need edits? Tell Text2Tool what to add, remove, or change before the final tool is created.</p>
            <div class="change-warning">Only use this if absolutely necessary. You can make changes or edit later in Google Sheets. Adding too many changes can cause AI to hallucinate.</div>
            <textarea id="changeRequestBox" placeholder="Example: Add supplier tracking, include payment status, simplify the dashboard, or change the monthly summary."></textarea>
            <div class="change-message" id="changeMessage"></div>
            <p class="change-note">Your saved changes will be used for the final tool, but they may not be shown in the preview above.</p>
          </section>

          <section class="card full bottom-actions-card" id="finishCard">
            <h2>Final Actions <span class="info-icon" title="Create the finished Google Sheet only when this preview looks right.">i</span></h2>
            <p>When ready, click Done — Export. AI will build your Google Sheet in the background and deliver it by email in 5–7 minutes.</p>
            <div class="actions">
              <button class="btn" type="button" id="requestChangesBtn">Save Changes</button>
              <button class="btn btn-primary" type="button" id="createFinalToolBtn">Done — Export</button>
            </div>
            <div class="change-message" id="finalToolMessage"></div>
            <p class="change-note">After export starts, 1 Tool Kit is used. Open the shared Google Sheet email and click File &gt; Make a copy to own and edit it.</p>
          </section>
        </div>
      `;

      setupChangeRequest();
      setupCreateFinalTool();
    }


    function setupCreateFinalTool() {
      const btn = document.getElementById('createFinalToolBtn');
      const msg = document.getElementById('finalToolMessage');
      if (!btn || !msg) return;

      btn.addEventListener('click', async () => {
        saveCurrentAnswer();

        msg.className = 'change-message';
        msg.textContent = '';

        if (!supabaseClient) {
          msg.className = 'change-message error';
          msg.textContent = 'Could not load the delivery system. Please refresh the page and try again.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Starting export...';
        msg.className = 'change-message success';
        msg.textContent = 'Starting export. 1 Tool Kit will be used and your Google Sheet will be emailed in 5–7 minutes.';

        try {
          const sessionResult = await supabaseClient.auth.getSession().catch(() => ({ data: null }));
          const session = sessionResult?.data?.session;
          if (!session?.access_token) {
            throw new Error('Please sign in first to create your final tool.');
          }

          const rpcResult = await withTimeout(
            supabaseClient.rpc('create_final_tool_delivery_request', {
              p_preview_id: exportPreviewId,
              p_preview_token: exportPreviewToken,
              p_followup_answers: buildFollowupAnswersObject()
            }),
            45000,
            'Final tool request timed out. Please try again.'
          );

          if (rpcResult.error) {
            throw new Error(rpcResult.error.message || 'Could not save final tool request.');
          }

          const data = rpcResult.data || {};
          if (!data.success) {
            throw new Error(data.message || 'Could not save final tool request.');
          }

          triggerFinalToolBuildInBackground(data.delivery_id, data.delivery_token, session.access_token);

          msg.className = 'change-message success';
          msg.textContent = 'Delivery = Email in 5–7 minutes';
          btn.textContent = 'Export Started';
          showExportStartedDialog();
        } catch (error) {
          msg.className = 'change-message error';
          msg.textContent = error?.message || 'Could not save final tool request. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Done — Export';
        }
      });
    }

    function triggerFinalToolBuildInBackground(deliveryId, deliveryToken, accessToken) {
      if (!deliveryId || !deliveryToken) return;

      try {
        fetch(SUPABASE_URL + '/functions/v1/process-tool-request', {
          method: 'POST',
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: 'Bearer ' + (accessToken || SUPABASE_KEY),
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            action: 'build_final_tool',
            delivery_id: deliveryId,
            delivery_token: deliveryToken
          }),
          keepalive: true
        }).then(response => {
          if (!response.ok) console.warn('Final tool background build request returned status:', response.status);
        }).catch(error => {
          console.warn('Final tool background build request failed:', error);
        });
      } catch (error) {
        console.warn('Could not start final tool background build:', error);
      }
    }

    function buildFollowupAnswersObject() {
      const result = {};
      questions.forEach((question, index) => {
        result[String(index + 1)] = {
          question: String(question || ''),
          answer: String(answers[index] || '').trim()
        };
      });
      return result;
    }

    function setupChangeRequest() {
      const box = document.getElementById('changeRequestBox');
      const btn = document.getElementById('requestChangesBtn');
      const msg = document.getElementById('changeMessage');
      if (!box || !btn || !msg) return;

      btn.addEventListener('click', async () => {
        const changeText = String(box.value || '').trim();

        msg.className = 'change-message';
        msg.textContent = '';

        if (!changeText) {
          msg.className = 'change-message error';
          msg.textContent = 'Please type the changes you want first.';
          return;
        }

        if (changeText.length > 4000) {
          msg.className = 'change-message error';
          msg.textContent = 'Please keep your change request under 4,000 characters.';
          return;
        }

        if (/(https?:\/\/|www\.|(^|[^A-Za-z0-9@._-])([A-Za-z0-9-]+\.)+[A-Za-z]{2,}([\/?#:]|$|[^A-Za-z0-9._-]))/i.test(changeText)) {
          msg.className = 'change-message error';
          msg.textContent = 'Links are not allowed here. Please remove website links/domains.';
          return;
        }

        if (!supabaseClient) {
          msg.className = 'change-message error';
          msg.textContent = 'Could not load the update system. Please refresh the page and try again.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Saving changes...';
        msg.className = 'change-message success';
        msg.textContent = 'Saving your changes for the final tool. Please wait...';

        try {
          const data = await callProcessToolRequest({
            action: 'request_changes',
            preview_id: previewId,
            preview_token: token,
            change_request: changeText
          });

          if (!data || !data.success) throw new Error(data?.error || 'Could not save changes.');

          if (data.preview_id && data.preview_token) {
            exportPreviewId = data.preview_id;
            exportPreviewToken = data.preview_token;
          }
          savedChangeRequest = changeText;

          msg.className = 'change-message success';
          msg.textContent = 'Changes saved for the final tool. They may not be shown in the preview above, but they will be used when you click Done — Export.';
          btn.disabled = false;
          btn.textContent = 'Save Changes';
        } catch (error) {
          msg.className = 'change-message error';
          msg.textContent = error?.message || 'Could not save changes. Please try again.';
          btn.disabled = false;
          btn.textContent = 'Save Changes';
        }
      });
    }


    async function callProcessToolRequest(payload, timeoutMs = 45000, timeoutMessage = 'Preview update timed out. Please try again.') {
      const sessionResult = await supabaseClient.auth.getSession().catch(() => ({ data: null }));
      const accessToken = sessionResult?.data?.session?.access_token || SUPABASE_KEY;

      const response = await withTimeout(fetch(SUPABASE_URL + '/functions/v1/process-tool-request', {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      }), timeoutMs, timeoutMessage);

      const text = await response.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) { data = null; }

      if (!response.ok) {
        throw new Error(data?.error || 'Could not update preview. Please try again.');
      }

      return data;
    }

    function renderStructure(value) {
      const rows = normalizeStructure(value);
      const usefulRows = rows.filter(row => String(row.tab_name || '').trim());

      // If Supabase/OpenAI sends a complete structure, show it.
      if (usefulRows.length && usefulRows.some(row => toArray(row.columns).length)) {
        return renderStructureTable(usefulRows);
      }

      // Google Sheets mode:
      // Do not show old HTML-preview placeholders like "To be confirmed".
      // The final Google Sheet is created by the Apps Script builder, but this preview
      // should still show the standard sheet tabs clearly before the user builds.
      return renderStructureTable(getGoogleSheetsPreviewRows());
    }

    function getGoogleSheetsPreviewRows() {
      const requestedFields = toArray(preview.preview_fields)
        .map(field => String(field || '').trim())
        .filter(Boolean);

      const dataColumns = requestedFields.length
        ? requestedFields.slice(0, 8)
        : ['Name / Item', 'Date', 'Status', 'Amount / Hours', 'Category', 'Notes'];

      return [
        {
          tab_name: 'Data',
          purpose: 'Main working tab where users enter and manage records.',
          columns: dataColumns
        },
        {
          tab_name: 'Dashboard',
          purpose: 'Simple overview with the most important KPIs and summaries.',
          columns: ['Total Records', 'Key Totals', 'Status Summary', 'Latest Activity', 'Important KPIs']
        },
        {
          tab_name: 'Visual Analytics',
          purpose: 'Charts and visual summaries based on the entered data.',
          columns: ['Charts', 'Graphs', 'Pie Charts', 'Trend Views', 'Visual KPIs']
        },
        {
          tab_name: 'Custom Analytics',
          purpose: 'User-controlled reporting with date and value filters.',
          columns: ['From Date', 'To Date', 'Filter By', 'Custom Summary', 'Filtered Results']
        },
        {
          tab_name: 'Settings',
          purpose: 'Dropdown source lists and editable tool settings.',
          columns: ['Dropdown Lists', 'Categories', 'Statuses', 'Names / Items', 'Tool Options']
        },
        {
          tab_name: 'Read Me',
          purpose: 'Short guide explaining how to use the finished Google Sheet.',
          columns: ['Tabs Guide', 'Button Guide', 'Safe Usage Tips']
        }
      ];
    }

    function renderStructureTable(rows) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tab Name</th>
                <th>Purpose</th>
                <th>Columns / Sections</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => {
                const columns = toArray(row.columns).filter(Boolean);
                const columnHtml = columns.length
                  ? columns.map(col => `<span class="col-pill">${escapeHtml(col)}</span>`).join('')
                  : '<span class="col-pill">Standard Google Sheet section</span>';

                return `
                  <tr>
                    <td>${escapeHtml(row.tab_name)}</td>
                    <td>${escapeHtml(row.purpose || 'Used for this part of the Google Sheet tool.')}</td>
                    <td><div class="columns">${columnHtml}</div></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderButtonsTable() {
      const rows = getMenuButtons();

      return `
        <div class="table-wrap" style="margin-top:14px;">
          <table>
            <thead>
              <tr>
                <th>Button</th>
                <th>What It Does</th>
                <th>When To Use It</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${escapeHtml(row.name)}</td>
                  <td>${escapeHtml(row.purpose)}</td>
                  <td>${escapeHtml(row.when)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function getMenuButtons() {
      const rows = [
        {
          name: '🤖 Reset Everything — Keep Data',
          purpose: 'Rebuilds the layout, default formulas, dropdowns, dashboard, charts, and protections while keeping entered data where possible.',
          when: 'Use if your team wants to reset the tool layout but keep the entered data.'
        },
        {
          name: '🔧 Fix Formulas Only — Keep Data',
          purpose: 'Repairs default formula cells without deleting normal working data.',
          when: 'Use if someone accidentally edits a calculation and wants Auto Bots to fix it.'
        },
        {
          name: '🛡️ Fix Default Formulas — Keep Your Custom Formulas',
          purpose: 'Fills missing default formulas while preserving custom formulas users added themselves.',
          when: 'Use when your team added custom formulas and only missing default formulas should be restored.'
        }
      ];

      const allText = [
        preview.preview_title,
        preview.preview_summary,
        toArray(preview.preview_fields).join(' '),
        toArray(preview.preview_sections).join(' ')
      ].join(' ').toLowerCase();

      if (/invoice|receipt|quote|estimate|pdf|print/.test(allText)) {
        rows.push({
          name: '⬇️ Save / Print PDF',
          purpose: 'Creates a clean PDF version of the selected invoice, quote, report, or document.',
          when: 'Use when your team wants a clean printable copy.'
        });
      }

      if (/email|send|invoice|receipt|report/.test(allText)) {
        rows.push({
          name: '✉️ Email PDF',
          purpose: 'Sends the generated document or report by email when the tool requires it.',
          when: 'Use when your team wants to send the document directly from the sheet.'
        });
      }

      return rows;
    }

    function renderList(value, emptyText) {
      const items = toArray(value);
      if (!items.length) return `<div class="empty">${escapeHtml(emptyText)}</div>`;
      return `<ul class="list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function renderQuestions() {
      const area = document.getElementById('questionsArea');
      if (!area) return;

      if (!questions.length) {
        area.innerHTML = '<div class="empty">✅ No follow-up questions were needed for this preview.</div>';
        return;
      }

      const q = questions[qIndex] || questions[0];
      const answeredCount = Object.values(answers).filter(v => String(v || '').trim()).length;
      const progress = Math.round(((qIndex + 1) / questions.length) * 100);
      const savedAnswer = answers[qIndex] || '';
      const completed = answeredCount >= questions.length;

      area.innerHTML = `
        <div class="question-box">
          <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div class="pill">Question ${qIndex + 1} of ${questions.length}</div>
            <div class="badge">${completed ? '✅ Questions completed' : '✅ ' + answeredCount + ' of ' + questions.length + ' saved'}</div>
          </div>
          <div class="progress-line"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="q-label">Text2Tool Question</div>
          <p class="q-text">${escapeHtml(q)}</p>
          <textarea id="answerBox" placeholder="Type your answer here...">${escapeHtml(savedAnswer)}</textarea>
          <div class="save-message success" id="answerSavedMsg">${savedAnswer ? '✅ Saved' : 'Answer saves automatically when you type.'}</div>
          <div class="actions">
            <button class="btn" type="button" id="prevQuestion">Previous</button>
            <button class="btn" type="button" id="skipQuestion">Skip for now</button>
            <button class="btn btn-primary" type="button" id="nextQuestion">${qIndex === questions.length - 1 ? 'Save Answer' : 'Save & Next'}</button>
            <button class="btn" type="button" id="copyAnswers">Copy answers</button>
          </div>
          <p style="color:#a59ab8;font-size:13px;font-weight:800;">${answeredCount} of ${questions.length} answered. Skipping is allowed.</p>
        </div>
      `;

      document.getElementById('answerBox').addEventListener('input', () => {
        saveCurrentAnswer();
        showSavedMessage();
      });
      document.getElementById('prevQuestion').addEventListener('click', () => { saveCurrentAnswer(); qIndex = Math.max(0, qIndex - 1); renderQuestions(); });
      document.getElementById('skipQuestion').addEventListener('click', () => { saveCurrentAnswer(); qIndex = Math.min(questions.length - 1, qIndex + 1); renderQuestions(); });
      document.getElementById('nextQuestion').addEventListener('click', () => { saveCurrentAnswer(); showSavedMessage(true); if (qIndex < questions.length - 1) { qIndex++; renderQuestions(); } });
      document.getElementById('copyAnswers').addEventListener('click', copyAnswers);
    }

    function showSavedMessage(force) {
      const msg = document.getElementById('answerSavedMsg');
      if (!msg) return;
      msg.className = 'save-message success';
      msg.textContent = '✅ Saved';
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        if (!force && msg) msg.textContent = '✅ Saved in this browser';
      }, 900);
    }

    function saveCurrentAnswer() {
      const answerBox = document.getElementById('answerBox');
      if (!answerBox) return;
      answers[qIndex] = answerBox.value;
      localStorage.setItem(storageKey, JSON.stringify(answers));
    }

    function readSavedAnswers() {
      try { return JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch (_) { return {}; }
    }

    function formatAnswers() {
      return questions.map((question, index) => {
        const answer = String(answers[index] || '').trim();
        return `Q${index + 1}: ${question}\nA${index + 1}: ${answer || '[Not answered yet]'}`;
      }).join('\n\n');
    }

    async function copyAnswers() {
      saveCurrentAnswer();
      try {
        await navigator.clipboard.writeText(formatAnswers());
        alert('Answers copied.');
      } catch (_) {
        alert(formatAnswers());
      }
    }

    function showError(message) {
      const box = document.getElementById('app');
      if (!box) return;
      box.innerHTML = `
        <div class="error-box">
          <h2>Preview could not be opened</h2>
          <p style="color:#c9c2d8;line-height:1.6;max-width:800px;margin:0 auto 18px;">${escapeHtml(message)}</p>
          <div class="actions" style="justify-content:center;">
            <a class="btn btn-primary" href="/create-tool/?v=preview-error">Create Tool</a>
            <a class="btn" href="/">Go Home</a>
          </div>
        </div>
      `;
    }

    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(message || 'Request timed out.')), ms))
      ]);
    }

    function normalizeStructure(value) {
      let rows = value;
      if (typeof rows === 'string') {
        try { rows = JSON.parse(rows); } catch (_) { rows = []; }
      }
      if (!Array.isArray(rows)) return [];
      return rows.map(item => {
        if (!item || typeof item !== 'object') return null;
        return {
          tab_name: String(item.tab_name || item.name || '').trim(),
          purpose: String(item.purpose || '').trim(),
          columns: toArray(item.columns)
        };
      }).filter(item => item && item.tab_name);
    }

    function toArray(value) {
      if (Array.isArray(value)) return value.map(item => {
        if (item && typeof item === 'object') {
          return String(item.name || item.title || item.label || item.button_name || item.tab_name || item.column || '').trim();
        }
        return String(item || '').trim();
      }).filter(Boolean);

      if (typeof value === 'string') {
        try {
          const parsed = JSON.parse(value);
          if (Array.isArray(parsed)) return toArray(parsed);
        } catch (_) {}
        return value.split('\n').map(item => item.trim()).filter(Boolean);
      }

      return [];
    }

    function capitalize(value) {
      const clean = String(value || '').trim();
      return clean ? clean.charAt(0).toUpperCase() + clean.slice(1) : '';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }
  </script>
